name: test_and_fix
description: A command-line tool to run tests and apply fixes to the genui monorepo.
version: 0.1.0
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

# Add regular dependencies here.
dependencies:
  analyzer: ^9.0.0
  args: ^2.7.0
  coverage: ^1.15.0
  file: ^7.0.1
  glob: ^2.1.3
  lcov_parser: ^0.1.3
  logging: ^1.3.0
  path: ^1.9.1
  process: ^5.0.5
  process_runner: ^4.2.4
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.26.2
