name: test_and_fix
description: A command-line tool to run tests and apply fixes to the genui monorepo.
publish_to: none

environment:
  sdk: ">=3.10.0 <4.0.0"

resolution: workspace

# Add regular dependencies here.
dependencies:
  # analyzer 10.0.2+ requires meta ^1.18.0, but the Flutter SDK currently
  # pins meta 1.17.0. Cap below 10.0.2 until Flutter ships a newer meta.
  analyzer: ">=8.0.0 <10.0.2"
  args: ^2.7.0
  coverage: ^1.15.0
  file: ^7.0.1
  glob: ^2.1.3
  lcov_parser: ^0.1.3
  logging: ^1.3.0
  path: ^1.9.1
  process: ^5.0.5
  process_runner: ^4.2.4
  pub_semver: ^2.2.0
  yaml: ^3.1.3

dev_dependencies:
  test: ^1.26.2
